# ── AI Layout ────────────────────────────────────────────────

[ai_layout]
ai_command          = "claude"
editor_command      = "nvim"
editor_ratio        = 0.5
git_command         = "lazygit"
git_pane_ratio      = 0.4
inactive_brightness = 0.7
keybinding_key      = "a"
keybinding_mods     = "SUPER|SHIFT"
tab_title_prefix    = "AI: "

# ── Keybindings ──────────────────────────────────────────────

[keybindings]
key_table_timeout_ms = 1000
scroll_lines         = 5
scroll_page_fraction = 0.75
