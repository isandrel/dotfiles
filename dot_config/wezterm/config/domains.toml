# ── Domains ──────────────────────────────────────────────────

[domains]
enable_ssh_wsl = true
ssh_wsl_name = "wsl.ssh"
ssh_wsl_remote_address = "localhost"
ssh_wsl_multiplexing = "None"
ssh_wsl_assume_shell = "Posix"
enable_wsl = true
wsl_name_prefix = "WSL:"

# ── Platform ─────────────────────────────────────────────────
# Platform-specific settings. Only relevant on the matching OS.

[platform.wsl]
user = "username"
distro = "Ubuntu"

[platform.windows]
user = "username"

# ── Launch Menu ──────────────────────────────────────────────

[launch_menu]

[[launch_menu.mac]]
label = "Bash"
args = ["bash", "-l"]

[[launch_menu.mac]]
label = "Fish"
args = ["/opt/homebrew/bin/fish", "-l"]

[[launch_menu.mac]]
label = "Nushell"
args = ["/opt/homebrew/bin/nu", "-l"]

[[launch_menu.mac]]
label = "Zsh"
args = ["zsh", "-l"]

[[launch_menu.linux]]
label = "Bash"
args = ["bash", "-l"]

[[launch_menu.linux]]
label = "Fish"
args = ["fish", "-l"]

[[launch_menu.linux]]
label = "Zsh"
args = ["zsh", "-l"]

[[launch_menu.windows]]
label = "PowerShell Core"
args = ["pwsh", "-NoLogo"]

[[launch_menu.windows]]
label = "PowerShell Desktop"
args = ["powershell"]

[[launch_menu.windows]]
label = "Command Prompt"
args = ["cmd"]

[[launch_menu.windows]]
label = "Nushell"
args = ["nu"]

[[launch_menu.windows]]
label = "Msys2"
args = ["ucrt64.cmd"]

[[launch_menu.windows]]
label = "Git Bash"
args = ["C:\\Users\\${win_user}\\scoop\\apps\\git\\current\\bin\\bash.exe"]
