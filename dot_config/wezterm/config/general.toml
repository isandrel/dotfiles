# ── General ───────────────────────────────────────────────────

[general]
automatically_reload_config = true
exit_behavior = "CloseOnCleanExit"
exit_behavior_messaging = "Verbose"
status_update_interval = 1000
scrollback_lines = 20000
date_format = "%a %H:%M:%S"
default_cwd = "~"

# ── Shell ─────────────────────────────────────────────────────

[shell]
# Override the default shell. Leave commented to use platform defaults below.
# default = ["zsh", "-l"]

# Platform-specific default programs (used when shell.default is not set)
[shell.default_prog]
mac = ["zsh", "-l"]
linux = ["fish", "-l"]
windows = ["pwsh", "-NoLogo"]

# ── GPU / Rendering ──────────────────────────────────────────

[gpu]
power_preference = "HighPerformance"
adapter_strategy = "best"
# To manually choose an adapter, set:
# adapter_strategy = "manual"
# backend = "Metal"
# device_type = "IntegratedGpu"
